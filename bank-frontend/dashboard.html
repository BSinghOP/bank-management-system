<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
<a href="#">Dashboard</a>
<a href="#">Transactions</a>
<a href="#">Transfer Money</a>
<a href="#">Profile</a>
<a onclick="logout()">Logout</a>
</div>

<div class="header">
<h1>SRM BANKING MANAGEMENT SYSTEM</h1>
</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>Account Balance</h3>
<p id="balance">₹0</p>
<button onclick="getBalance()">Refresh</button>
</div>

<div class="card">
<h3>Transfer Money</h3>

<input id="receiver" placeholder="Receiver Email">
<input id="amount" placeholder="Amount">

<button onclick="transfer()">Send</button>

</div>

</div>

<h2>Transaction History</h2>

<table>
<thead>
<tr>
<th>Sender</th>
<th>Receiver</th>
<th>Amount</th>
<th>Date</th>
</tr>
</thead>

<tbody id="transactions"></tbody>

</table>

</div>

<script src="script.js"></script>

</body>
</html>
